<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <h2>Add Task</h2>
        <div>
            <input id="taskLabel" type="text" placeholder="Label" />
            <input id="taskDescription" type="text" placeholder="Description">
            <button id="addTaskBtn">Add Task</button>
        </div>
        <h2>Remove Task</h2>
        <div>
            <input id="removeTaskId" type="number" placeholder="ID">
            <button id="removeTaskBtn">Remove Task</button>
        </div>
        <ul id="taskList"></ul>
        <p>Total Tasks: <span id="totalTasks"></span></p>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
