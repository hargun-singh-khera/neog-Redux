<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <h2>Add Profile</h2>
        <div>
            <input id="addProfileId" type="number" placeholder="ID" />
            <input id="name" type="text" placeholder="Name">
            <input id="age" type="number" placeholder="Age">
            <button id="addProfileBtn">Add Profile</button>
        </div>
        <h2>Remove Profile</h2>
        <div>
            <input id="removeProfileId" type="number" placeholder="ID">
            <button id="removeProfileBtn">Remove Profile</button>
        </div>
        <h2>Profiles</h2>
        <ul id="profilesList"></ul>
        <p>Average Age: <span id="avgAge"></span></p>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
